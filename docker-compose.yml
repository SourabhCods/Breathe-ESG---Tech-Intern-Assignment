version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: esg_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=breathe_esg
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    restart: always

  backend:
    build: ./backend
    container_name: esg_django_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata seed.json || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=production-secret-key-change-me
      - DATABASE_URL=postgres://postgres:postgres@db:5432/breathe_esg
      - ALLOWED_HOSTS=*
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: esg_react_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
